<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Rate Tracker</title>
    <style>
        :root {
            --ulo-color: aqua;
            --weekend-color: lightgreen;
            --mid-color: #FFBF00;
            --on-color: #ff3b30;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; 
            line-height: 1.4;
            color: #333;
            background-color: #f9f9f9;
        }

        h1 { 
            font-size: 1.5rem; 
            text-align: center;
            margin-bottom: 20px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        th, td { 
            padding: 15px 10px; 
            border: 1px solid #eee; 
            text-align: left; 
        }

        th { background-color: #f4f4f4; font-weight: 600; }

        /* Mobile Optimization: Stacked Rows */
        @media (max-width: 600px) {
            thead { display: none; } /* Hide headers on mobile */
            
            tr { 
                display: block; 
                margin-bottom: 10px; 
                border: 2px solid #ddd;
                border-radius: 8px;
            }

            td { 
                display: block; 
                text-align: right; 
                border: none;
                position: relative;
                padding-left: 50%;
            }

            /* Add labels for mobile view */
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 45%;
                font-weight: bold;
                text-align: left;
            }
            
            td:last-child { border-bottom: 0; }
        }

        /* Active State Styles */
        .active-row { font-weight: bold; transform: scale(1.02); }
        .active-ulo { background-color: var(--ulo-color) !important; }
        .active-weekend { background-color: var(--weekend-color) !important; }
        .active-mid { background-color: var(--mid-color) !important; }
        .active-on { background-color: var(--on-color) !important; color: white; }
        
        /* Smooth transition for highlighting */
        tr { transition: all 0.3s ease; }
    </style>
</head>
<body>

    <h1>Electricity Rate Tracker</h1>
    
    <table>
        <thead>
            <tr>
                <th>Period</th>
                <th>Rate (¢/kWh)</th>
                <th>Hours</th>
            </tr>
        </thead>
        <tbody>
            <tr id="row-ulo">
                <td data-label="Period">Ultra-Low Overnight</td>
                <td data-label="Rate">3.9¢</td>
                <td data-label="Hours">11 PM – 7 AM</td>
            </tr>
            <tr id="row-weekend">
                <td data-label="Period">Weekend Off-Peak</td>
                <td data-label="Rate">9.8¢</td>
                <td data-label="Hours">7 AM – 11 PM</td>
            </tr>
            <tr id="row-mid">
                <td data-label="Period">Mid-Peak</td>
                <td data-label="Rate">15.7¢</td>
                <td data-label="Hours">7 AM–4 PM & 9–11 PM</td>
            </tr>
            <tr id="row-on">
                <td data-label="Period">On-Peak</td>
                <td data-label="Rate">39.1¢</td>
                <td data-label="Hours">4 PM – 9 PM</td>
            </tr>
        </tbody>
    </table>

    <script>
        function updateHighlight() {
            // Testing setup (set isTesting to true to simulate specific times)
            const isTesting = false; 
            const mockHour = 18; // 6 PM
            const mockDay = 1;   // Monday

            const now = isTesting ? new Date(2026, 3, 28, mockHour, 0) : new Date();
            const hours = now.getHours();
            const day = now.getDay();
            const isWeekend = (day === 0 || day === 6);

            // Clear previous styles
            document.querySelectorAll('tbody tr').forEach(tr => {
                tr.className = '';
            });

            let activeId = "";
            let activeClass = "";

            if (hours >= 23 || hours < 7) {
                activeId = "row-ulo";
                activeClass = "active-ulo";
            } else if (isWeekend) {
                activeId = "row-weekend";
                activeClass = "active-weekend";
            } else if (hours >= 16 && hours < 21) {
                activeId = "row-on";
                activeClass = "active-on";
            } else {
                activeId = "row-mid";
                activeClass = "active-mid";
            }

            const activeRow = document.getElementById(activeId);
            if (activeRow) {
                activeRow.classList.add('active-row', activeClass);
            }
        }

        // Update every minute instead of every second to save mobile battery
        setInterval(updateHighlight, 60000);
        updateHighlight();
    </script>
</body>
</html>
