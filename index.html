<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Electricity Rate</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
        }

        h1 { font-size: 1.2rem; color: #666; margin-bottom: 10px; }

        /* Hide all rows by default */
        tr { display: none; }

        /* Container styling */
        table { 
            width: 100%; 
            max-width: 400px; 
            border-collapse: collapse; 
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Show only the active row */
        tr.active-row { 
            display: block; 
            padding: 30px 20px;
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }

        /* Styling for the internal layout of the active row */
        .active-row td {
            display: block;
            border: none;
        }

        .period-name { font-size: 1.1rem; color: #444; }
        .rate-value { font-size: 3rem; font-weight: 800; margin: 10px 0; }
        .hours-range { font-size: 0.9rem; color: #888; }

        /* Color Themes */
        .active-ulo { background-color: aqua; }
        .active-weekend { background-color: lightgreen; }
        .active-mid { background-color: #FFBF00; }
        .active-on { background-color: #ff3b30; color: white; }
        .active-on .hours-range, .active-on .period-name { color: rgba(255,255,255,0.9); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>Current Rate Period</h1>
    
    <table>
        <tbody>
            <tr id="row-ulo">
                <td>
                    <div class="period-name">Ultra-Low Overnight</div>
                    <div class="rate-value">3.9¢</div>
                    <div class="hours-range">11 PM – 7 AM</div>
                </td>
            </tr>
            <tr id="row-weekend">
                <td>
                    <div class="period-name">Weekend Off-Peak</div>
                    <div class="rate-value">9.8¢</div>
                    <div class="hours-range">7 AM – 11 PM (Weekends)</div>
                </td>
            </tr>
            <tr id="row-mid">
                <td>
                    <div class="period-name">Mid-Peak</div>
                    <div class="rate-value">15.7¢</div>
                    <div class="hours-range">Weekdays: 7 AM–4 PM & 9–11 PM</div>
                </td>
            </tr>
            <tr id="row-on">
                <td>
                    <div class="period-name">On-Peak</div>
                    <div class="rate-value">39.1¢</div>
                    <div class="hours-range">Weekdays: 4 PM – 9 PM</div>
                </td>
            </tr>
        </tbody>
    </table>

    <script>
        function updateHighlight() {
            const isTesting = false; // Toggle to true to test
            const mockHour = 18; 
            const mockDay = 1; 

            const now = isTesting ? new Date(2026, 3, 28, mockHour, 0) : new Date();
            const hours = now.getHours();
            const day = now.getDay();
            const isWeekend = (day === 0 || day === 6);

            // Remove active class from everything
            document.querySelectorAll('tr').forEach(tr => {
                tr.classList.remove('active-row', 'active-ulo', 'active-weekend', 'active-mid', 'active-on');
            });

            let activeId = "";
            let activeClass = "";

            if (hours >= 23 || hours < 7) {
                activeId = "row-ulo";
                activeClass = "active-ulo";
            } else if (isWeekend) {
                activeId = "row-weekend";
                activeClass = "active-weekend";
            } else if (hours >= 16 && hours < 21) {
                activeId = "row-on";
                activeClass = "active-on";
            } else {
                activeId = "row-mid";
                activeClass = "active-mid";
            }

            const activeRow = document.getElementById(activeId);
            activeRow.classList.add('active-row', activeClass);
        }

        setInterval(updateHighlight, 60000);
        updateHighlight();
    </script>
</body>
</html>
